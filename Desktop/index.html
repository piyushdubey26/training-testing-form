<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>

    <h1>BBD UNIVERSITY FORM</h1>
    <form action="#">  
        <label for=" first name">Name:</label>
        <input type="text" placeholder="first name" required>
        <input type="text" placeholder="last name " required>
        <br><br>

        <label for="Roll no">Roll no:</label>
        <input type="number" id="Roll no" name="Roll no" required>
        <br><br>
    
       <label for="phone no">phone no:</label>
        <input type="tel" id="phone no" name="phone no" required>
        <br><br>
    

        <label for="DOB">DOB:</label>
        <input type="date" id="DOB" name="DOB" required>
        <br><br>
    
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>
     
        <label for="Address">Address:</label>
        <input type="text" id="Address" name="Address" required>
        <br><br>
        
        <label for="course">Course:</label>

<select id="course" name="course" required>

    <option value="">Select Course</option>
    <option value="BTech CSE">B.Tech CSE</option>
    <option value="BTech IT">B.Tech IT</option>
    <option value="BCA">BCA</option>
    <option value="MCA">MCA</option>


</select>
<br></br>

        <input type="submit" value="Register">
        <input type="reset" value="reset">
    </form>

</body>

</html>
